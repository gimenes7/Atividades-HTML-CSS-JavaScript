<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Verificar Tipo de Caractere</title>
</head>
<body>
    <script>
        var caractere = prompt("Digite um único caractere:");

        switch (caractere) {
            // Vogais maiúsculas e minúsculas
            case "a": case "A":
            case "e": case "E":
            case "i": case "I":
            case "o": case "O":
            case "u": case "U":
                alert("É uma vogal!");
                break;

            // Consoantes maiúsculas e minúsculas
            case "b": case "B": case "c": case "C": case "d": case "D":
            case "f": case "F": case "g": case "G": case "h": case "H":
            case "j": case "J": case "k": case "K": case "l": case "L":
            case "m": case "M": case "n": case "N": case "p": case "P":
            case "q": case "Q": case "r": case "R": case "s": case "S":
            case "t": case "T": case "v": case "V": case "w": case "W":
            case "x": case "X": case "y": case "Y": case "z": case "Z":
                alert("É uma consoante!");
                break;

            // Números de 0 a 9
            case "0": case "1": case "2": case "3": case "4":
            case "5": case "6": case "7": case "8": case "9":
                alert("É um número!");
                break;

            // Qualquer outro caractere
            default:
                alert("Não é letra nem número.");
        }
    </script>
</body>
</html>
