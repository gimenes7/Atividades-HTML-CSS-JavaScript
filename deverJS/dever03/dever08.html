<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Vetor de Cidades</title>
</head>
<body>
    <script>
        var cidades = [
            prompt("Digite o nome da 1ª cidade:"),
            prompt("Digite o nome da 2ª cidade:"),
            prompt("Digite o nome da 3ª cidade:"),
            prompt("Digite o nome da 4ª cidade:"),
            prompt("Digite o nome da 5ª cidade:")
        ];

        console.log("1ª cidade: " + cidades[0]);
        console.log("2ª cidade: " + cidades[1]);
        console.log("3ª cidade: " + cidades[2]);
        console.log("4ª cidade: " + cidades[3]);
        console.log("5ª cidade: " + cidades[4]);
    </script>
</body>
</html>
