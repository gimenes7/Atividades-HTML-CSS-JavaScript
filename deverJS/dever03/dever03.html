<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>
        var letra = prompt("Digite uma letra.");
        switch (letra) {

            case "A":
            case "a":
            case "E":
            case "e":
            case "I":
            case "i":
            case "O":
            case "o":
            case "U":
            case "u":
                alert("A letra " + letra + " é uma vogal")
                break;
            default:
                alert("O caractere " + letra + " não é uma vogal")
                break;
        }

    </script>
</body>

</html>
