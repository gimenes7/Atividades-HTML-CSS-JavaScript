<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Verificar Consoante</title>
</head>
<body>
    <script>
        var caractere = prompt("Digite um caractere:");

        switch (caractere) {
            case "b": case "B":
            case "c": case "C":
            case "d": case "D":
            case "f": case "F":
            case "g": case "G":
            case "h": case "H":
            case "j": case "J":
            case "k": case "K":
            case "l": case "L":
            case "m": case "M":
            case "n": case "N":
            case "p": case "P":
            case "q": case "Q":
            case "r": case "R":
            case "s": case "S":
            case "t": case "T":
            case "v": case "V":
            case "w": case "W":
            case "x": case "X":
            case "y": case "Y":
            case "z": case "Z":
                alert("É uma consoante!");
                break;
            default:
                alert("Não é uma consoante.");
        }
    </script>
</body>
</html>
