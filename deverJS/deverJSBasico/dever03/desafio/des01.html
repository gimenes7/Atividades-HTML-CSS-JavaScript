<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Verificar Vogal</title>
</head>
<body>
    <script>
        var caractere = prompt("Digite um caractere:");

        switch (caractere) {
            case "a":
            case "A":
            case "e":
            case "E":
            case "i":
            case "I":
            case "o":
            case "O":
            case "u":
            case "U":
                alert("É uma vogal!");
                break;
            default:
                alert("Não é uma vogal.");
        }
    </script>
</body>
</html>
