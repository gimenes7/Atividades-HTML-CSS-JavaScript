<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        var num = prompt("Digite um número de 0 a 12 para cada mes do ano.");

        switch (num) {
            case "1":
                alert("O mes é Janeiro")
                break;
            case "2":
                alert("O mes é fevereiro")
                break;
            case "3":
                alert("O mes é Março")
                break;
            case "4":
                alert("O mes é Abril")
                break;
            case "5":
                alert("O mes é Maio")
                break;
            case "6":
                alert("O mes é Junho")
                break;
            case "7":
                alert("O mes é Julho")
                break;
            case "8":
                alert("O mes é Agosto")
                break;
            case "9":
                alert("O mes é Setembro")
                break;
            case "10":
                alert("O mes é Outubro")
                break;
            case "11":
                alert("O mes é Novembro")
                break;
            case "12":
                alert("O mes é Dezembro")
                break;

            default:
                alert("O número " + num + " não corresponde a nenhum mês")
                break;
        }
    </script>
</body>

</html>
