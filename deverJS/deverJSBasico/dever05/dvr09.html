<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        var p = parseInt(prompt("Digite um número"));
        var d = 0;

        for (var i = 1; i <= p; i++) {
            if (p % i === 0) {
                d++;
            }
        }

        if (d == 2) {
            alert("Seu número é primo");
        } else {
            alert("Seu número não é primo");
        }
    </script>
</body>
</html>
