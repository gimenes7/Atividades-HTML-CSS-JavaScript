<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        var num = parseInt(prompt("Digite um número inteiro positivo:"));
        var fatorial = 1;

        for (var i = num; i > 1; i--) {
            fatorial *= i;
        }

        alert("O fatorial de " + num + " é " + fatorial);
    </script>

</body>
</html>
