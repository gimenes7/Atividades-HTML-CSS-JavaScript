<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ler 12 Nomes</title>
</head>
<body>
    <script>
        var nomes = [];

        for (var i = 0; i < 12; i++) {
            var nome = prompt("Digite o " + (i + 1) + "º nome:");
            nomes.push(nome);
        }

        console.log("Nomes digitados:", nomes);
    </script>
</body>
</html>
