<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ler 12 Nomes</title>
</head>
<body>
    <script>
        var nomes = [];
        var i = 0;

        while (i < 12) {
            var nome = prompt("Digite o " + (i+1) + "º nome:");
            nomes.push(nome);
            i++;
        }

        console.log("Nomes digitados:", nomes);
    </script>
</body>
</html>
