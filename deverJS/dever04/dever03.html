<!DOCTYPE html>
<html lang="en">
<head>

<body>
    
    <script>

        var num = 25;

        while (num >= 1) {
            console.log(num);
            num--;
        }
        while (num <= 25) {
            console.log(num);
            num++;
            
        }
    </script>
</body>
