<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CPF Automático</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 5px;
      width: 200px;
    }

    #mensagem {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Digite seu CPF</h2>

  <input type="text" id="cpf" maxlength="14" onkeyup="formatarCPF()" placeholder="000.000.000-00">

  <div id="mensagem"></div>

  <script>
    function formatarCPF() {
      let input = document.getElementById("cpf");
      let valor = input.value;

      // remove tudo que não é número
      valor = valor.replace(/\D/g, "");

      // adiciona pontos e traço
      if (valor.length > 3 && valor.length <= 6) {
        valor = valor.replace(/(\d{3})(\d+)/, "$1.$2");
      } else if (valor.length > 6 && valor.length <= 9) {
        valor = valor.replace(/(\d{3})(\d{3})(\d+)/, "$1.$2.$3");
      } else if (valor.length > 9) {
        valor = valor.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, "$1.$2.$3-$4");
      }

      input.value = valor;

      let msg = document.getElementById("mensagem");

      if (valor.length === 14) {
        msg.innerHTML = "✅ CPF no formato correto!";
        msg.style.color = "green";
        input.style.borderColor = "green";
      } else {
        msg.innerHTML = "⌨️ Digite o CPF completo...";
        msg.style.color = "orange";
        input.style.borderColor = "#ccc";
      }
    }
  </script>

</body>
</html>
