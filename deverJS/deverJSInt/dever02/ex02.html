<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Média de Notas</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    #mensagem {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Digite 4 notas (0 a 100)</h2>

  <input type="number" id="n1" oninput="validar(this)">
  <input type="number" id="n2" oninput="validar(this)">
  <input type="number" id="n3" oninput="validar(this)">
  <input type="number" id="n4" oninput="validar(this)">
  <br><br>

  <button onclick="calcularMedia()">Calcular Média</button>

  <p id="mensagem"></p>

  <script>
    function validar(campo) {
      let valor = campo.value;
      let msg = document.getElementById("mensagem");

      if (valor < 0 || valor > 100 || valor === "") {
        campo.style.borderColor = "red";
        msg.innerHTML = "❌ Digite apenas valores entre 0 e 100!";
        msg.style.color = "red";
      } else {
        campo.style.borderColor = "green";
        msg.innerHTML = "";
      }
    }

    function calcularMedia() {
      let n1 = Number(document.getElementById("n1").value);
      let n2 = Number(document.getElementById("n2").value);
      let n3 = Number(document.getElementById("n3").value);
      let n4 = Number(document.getElementById("n4").value);
      let msg = document.getElementById("mensagem");

      if (
        n1 < 0 || n1 > 100 ||
        n2 < 0 || n2 > 100 ||
        n3 < 0 || n3 > 100 ||
        n4 < 0 || n4 > 100
      ) {
        msg.innerHTML = "❌ Corrija as notas antes de calcular!";
        msg.style.color = "red";
        return;
      }

      let media = (n1 + n2 + n3 + n4) / 4;

      msg.innerHTML = "✅ Média: " + media.toFixed(2);
      msg.style.color = "green";
    }
  </script>

</body>
</html>
