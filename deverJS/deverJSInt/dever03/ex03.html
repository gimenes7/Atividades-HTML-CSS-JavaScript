<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Atividade 3 – Cadastro de Professor</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { margin-bottom: 20px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input { padding: 6px; width: 300px; margin-top: 4px; }
    button { margin-top: 16px; padding: 8px 20px; cursor: pointer; }
  </style>
</head>
<body>

<h1>Cadastro de Professor</h1>

<label>Nome</label>
<input type="text" id="nome" placeholder="Nome completo">

<label>CPF</label>
<input type="text" id="cpf" placeholder="000.000.000-00">

<label>Telefone</label>
<input type="text" id="telefone" placeholder="(00) 00000-0000">

<label>E-mail</label>
<input type="email" id="email" placeholder="email@exemplo.com">

<label>Matrícula</label>
<input type="text" id="matricula" placeholder="MAT-00001">

<label>Salário (R$)</label>
<input type="number" id="salario" placeholder="0.00" min="0" step="0.01">

<br>
<button onclick="salvarProfessor()">Salvar</button>

<script>
  class Professor {
    constructor(nome, cpf, telefone, email, matricula, salario) {
      this.nome      = nome;
      this.cpf       = cpf;
      this.telefone  = telefone;
      this.email     = email;
      this.matricula = matricula;
      this.salario   = salario;
    }
  }

  function salvarProfessor() {
    let professor = new Professor(
      document.getElementById("nome").value,
      document.getElementById("cpf").value,
      document.getElementById("telefone").value,
      document.getElementById("email").value,
      document.getElementById("matricula").value,
      document.getElementById("salario").value
    );

    alert("professor salvo com sucesso");
    console.log(professor);
  }
</script>

</body>
</html>
