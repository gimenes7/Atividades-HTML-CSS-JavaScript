<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>
        let numeros = [];

        for (let i = 0; i < 30; i++) {
            numeros.push(Math.floor(Math.random() * 100));
        }

        let soma = 0;

        for (let i = 0; i < numeros.length; i++) {
            soma += numeros[i];
        }

        console.log(soma);
    </script>
</body>

</html>
