<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>
        let numeros = [];
        for (let i = 0; i < 20; i++) numeros[i] = parseInt(Math.random() * 1001);

        for (let i = 0; i <= 10; i++) console.log("Indice " + i + ": " + numeros[i]);

        for (let i = 0; i < numeros.length - 1; i++) {
            for (let j = i + 1; j < numeros.length; j++) {
                if (numeros[i] > numeros[j]) {
                    let temp = numeros[i];
                    numeros[i] = numeros[j];
                    numeros[j] = temp;
                }
            }
        }

        for (let i = 0; i < numeros.length; i++) console.log("Indice " + i + ": " + numeros[i]);
    </script>
</body>

</html>
