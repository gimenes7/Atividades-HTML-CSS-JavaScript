<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>
        let numeros = [];

        for (let i = 0; i < 30; i++) {
            numeros.push(Math.floor(Math.random() * 100));
        }

        let maior = numeros[0];
        let menor = numeros[0];

        for (let i = 1; i < numeros.length; i++) {
            if (numeros[i] > maior) {
                maior = numeros[i];
            }
            if (numeros[i] < menor) {
                menor = numeros[i];
            }
        }

        console.log("Maior:", maior);
        console.log("Menor:", menor);
    </script>
</body>

</html>
