<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>
        let numeros = [];
        for (let i = 0; i < 10; i++) {
            let num = parseInt(prompt(`Digite um número inteiro:`));
            numeros.push(num);
        }

        let maior = numeros[0];

        for (let i = 1; i < numeros.length; i++) {
            if (numeros[i] > maior) {
                maior = numeros[i];
            }
        }

        console.log(maior);
    </script>
</body>

</html>
