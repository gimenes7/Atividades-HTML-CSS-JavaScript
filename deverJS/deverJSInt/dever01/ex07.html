<!DOCTYPE html>

<body>


    <script>
        let numeros = [];

        for (let i = 0; i < 40; i++) {
            numeros.push(Math.floor(Math.random() * 100));
        }

        console.log(numeros);

        numeros.sort((a, b) => a - b);

        console.log(numeros);
    </script>
