<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>4 - Confirmar Senha</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 50px auto;
      text-align: center;
    }

    .campo {
      margin-bottom: 15px;
      text-align: left;
    }

    input {
      padding: 8px;
      font-size: 16px;
      width: 200px;
    }

    #mensagem {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>Confirmar Senha</h2>

  <div class="campo">
    <label>Senha: <br><input type="password" id="senha"></label>
  </div>

  <div class="campo">
    <label>Confirmar Senha: <br><input type="password" id="confirmarSenha"></label>
  </div>

  <p id="mensagem"></p>

  <script>
    const senha = document.getElementById("senha");
    const confirmarSenha = document.getElementById("confirmarSenha");
    const mensagem = document.getElementById("mensagem");

    // Evento disparado quando o usuário sai da segunda input (perde o foco)
    confirmarSenha.addEventListener("blur", function () {
      if (confirmarSenha.value === "") {
        mensagem.innerHTML = "";
        return;
      }

      if (senha.value === confirmarSenha.value) {
        mensagem.innerHTML = "As senhas conferem!";
        mensagem.style.color = "green";
      } else {
        mensagem.innerHTML = "Erro: as senhas não são iguais.";
        mensagem.style.color = "red";
      }
    });
  </script>

</body>

</html>
