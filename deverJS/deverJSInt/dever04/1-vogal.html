<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>1 - Verificar Vogal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 50px auto;
      text-align: center;
    }

    input {
      padding: 8px;
      font-size: 16px;
      width: 100px;
      text-align: center;
    }

    button {
      padding: 8px 16px;
      font-size: 16px;
      margin-left: 10px;
      cursor: pointer;
    }

    #mensagem {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>Digite uma vogal</h2>

  <input type="text" id="inputVogal" maxlength="1">
  <button id="btnVerificar">Verificar</button>

  <p id="mensagem"></p>

  <script>
    const inputVogal = document.getElementById("inputVogal");
    const btnVerificar = document.getElementById("btnVerificar");
    const mensagem = document.getElementById("mensagem");

    btnVerificar.addEventListener("click", function () {
      const valor = inputVogal.value.toLowerCase();
      const vogais = ["a", "e", "i", "o", "u"];

      let ehVogal = false;

      for (let i = 0; i < vogais.length; i++) {
        if (valor === vogais[i]) {
          ehVogal = true;
        }
      }

      if (ehVogal) {
        inputVogal.style.backgroundColor = "lightgreen";
        mensagem.innerHTML = "Letra válida! É uma vogal.";
        mensagem.style.color = "green";
      } else {
        inputVogal.style.backgroundColor = "salmon";
        mensagem.innerHTML = "Erro: o caractere digitado não é uma vogal.";
        mensagem.style.color = "red";
      }
    });
  </script>

</body>

</html>
