<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        for (var num = 25; num >= 1; num--) {
            console.log(num);
        }

        for (var num = 1; num <= 25; num++) {
            console.log(num);
        }
    </script>
</body>
</html>
