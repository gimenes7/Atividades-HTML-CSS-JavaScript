<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Xadrez</title>

    <style>
      body {
        display: flex;
        justify-content: center;
      }

      .tabuleiro {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
      }

      .casa {
        aspect-ratio: 1;
      }

      @media screen and (max-width: 320px) {
        .tabuleiro {
          width: 300px;
        }
        .clara {
          background: white;
        }
        .escura {
          background: green;
        }
      }

      @media screen and (min-width: 321px) and (max-width: 800px) {
        .tabuleiro {
          width: 400px;
        }
        .clara {
          background: yellow;
        }
        .escura {
          background: blue;
        }
      }

      @media screen and (min-width: 801px) {
        .tabuleiro {
          width: 500px;
        }
        .clara {
          background: red;
        }
        .escura {
          background: black;
        }
      }
    </style>
  </head>

  <body>
    <div class="tabuleiro">
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>

      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>

      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>

      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>

      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>

      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>

      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>

      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
      <div class="casa escura"></div>
      <div class="casa clara"></div>
    </div>
  </body>
</html>
